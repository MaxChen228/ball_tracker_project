<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lab labeller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <div id="item-info">
      <span id="item-slug">no item</span>
      <select id="item-picker"></select>
    </div>
  </header>

  <main id="stage">
    <div id="video-wrap">
      <video id="video" controls preload="auto"></video>
      <canvas id="overlay"></canvas>
    </div>
  </main>

  <section id="timeline-section">
    <div id="timeline-wrap">
      <div id="timeline-fills"></div>
      <div id="marker-in" class="marker marker-in" hidden></div>
      <div id="marker-out" class="marker marker-out" hidden></div>
      <div id="marker-seed" class="marker marker-seed" hidden>&#9733;</div>
      <input id="scrubber" type="range" min="0" max="0" step="1" value="0">
    </div>
  </section>

  <section id="controls">
    <button id="btn-in" type="button">Mark In [</button>
    <button id="btn-out" type="button">Mark Out ]</button>
    <button id="btn-seed" type="button">Mark Seed (S)</button>
    <button id="btn-propagate" type="button" disabled>Propagate (Enter)</button>
    <button id="btn-cancel" type="button">Cancel (Esc)</button>
  </section>

  <footer id="statusbar">
    <span id="status-line">f=0000 t=0.000s | in=- out=- seed=- pt=- | status=idle</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
