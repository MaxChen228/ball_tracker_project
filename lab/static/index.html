<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lab labeller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <span id="item-slug">no item</span>
    <div id="model-info">
      <label>seed: <select id="seed-model"></select></label>
      <label>prop: <select id="prop-model"></select></label>
    </div>
    <div id="mask-color-swatches">
      <button class="swatch" data-color="green"  title="Green"  type="button"></button>
      <button class="swatch" data-color="blue"   title="Blue"   type="button"></button>
      <button class="swatch" data-color="red"    title="Red"    type="button"></button>
      <button class="swatch" data-color="yellow" title="Yellow" type="button"></button>
    </div>
  </header>

  <div id="main-layout">
    <nav id="sidebar">
      <div id="sidebar-header">
        <span>Sessions</span>
        <button id="btn-rescan" type="button" title="Rescan source dirs">↺</button>
      </div>
      <div id="queue-bar">
        <button id="btn-queue" type="button" disabled>▶ Run Queue (0)</button>
      </div>
      <div id="item-list"></div>
    </nav>

    <div id="work-area">
      <main id="stage">
        <div id="video-wrap" tabindex="-1">
          <video id="video" preload="metadata" playsinline></video>
          <img id="frame-img" alt="" decoding="async">
          <canvas id="overlay"></canvas>
        </div>
      </main>

      <section id="segments-section">
        <div id="segments-strip"></div>
      </section>

      <section id="timeline-section">
        <div id="timeline-wrap">
          <div id="timeline-fills"></div>
          <div id="marker-layer"></div>
          <input id="scrubber" type="range" min="0" max="0" step="1" value="0">
        </div>
      </section>

      <section id="controls">
        <button id="btn-in" type="button">Mark In [</button>
        <button id="btn-out" type="button">Mark Out ]</button>
        <button id="btn-seed" type="button">Mark Seed (S)</button>
        <button id="btn-new-seg" type="button">+ New Segment (N)</button>
        <button id="btn-propagate" type="button" disabled>Propagate (Enter)</button>
        <button id="btn-cancel" type="button">Cancel (Esc)</button>
        <button id="btn-toggle-seed-marker" type="button">Hide Seed × (H)</button>
        <label id="play-rate-label">Speed
          <select id="play-rate">
            <option value="0.1">0.1×</option>
            <option value="0.25">0.25×</option>
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
          </select>
        </label>
      </section>
    </div>
  </div>

  <footer id="statusbar">
    <span id="status-line">f=0000 t=0.000s | in=- out=- seed=- pt=- | status=idle</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
